<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek AI - Debug Version</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: monospace;
            background: #1a1a1a;
            color: #00ff00;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .panel {
            background: #2d2d2d;
            border: 1px solid #00ff00;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }

        h2 {
            color: #00ff00;
            margin-bottom: 15px;
        }

        input, select, button, textarea {
            background: #1a1a1a;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 10px;
            margin: 5px;
            font-family: monospace;
        }

        button {
            cursor: pointer;
            background: #2d2d2d;
        }

        button:hover {
            background: #00ff00;
            color: #1a1a1a;
        }

        .log {
            background: #1a1a1a;
            border: 1px solid #00ff00;
            padding: 10px;
            height: 400px;
            overflow-y: auto;
            font-size: 12px;
        }

        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #00ff00;
        }

        .error {
            color: #ff4444;
            border-left-color: #ff4444;
        }

        .success {
            color: #00ff00;
            border-left-color: #00ff00;
        }

        .info {
            color: #ffff00;
            border-left-color: #ffff00;
        }

        .chat-area {
            height: 300px;
            overflow-y: auto;
            background: #1a1a1a;
            padding: 10px;
            margin-bottom: 10px;
        }

        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }

        .user {
            background: #2d2d2d;
            border-left: 3px solid #00ff00;
        }

        .ai {
            background: #2d2d2d;
            border-left: 3px solid #ffff00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐛 DeepSeek API Debug Tool</h1>
        
        <!-- API Configuration Panel -->
        <div class="panel">
            <h2>⚙️ API Configuration</h2>
            <input type="text" id="apiKey" placeholder="DeepSeek API Key (sk-...)" style="width: 400px;">
            <select id="model">
                <option value="deepseek-chat">DeepSeek Chat</option>
                <option value="deepseek-coder">DeepSeek Coder</option>
            </select>
            <button onclick="saveConfig()">💾 Save</button>
            <button onclick="testConnection()">🔌 Test Connection</button>
            <button onclick="clearLogs()">🗑️ Clear Logs</button>
        </div>
        
        <!-- Test API Panel -->
        <div class="panel">
            <h2>🧪 Quick Test</h2>
            <button onclick="testSimpleRequest()">Test Simple Request</button>
            <button onclick="testWithProxy()">Test with CORS Proxy</button>
            <button onclick="testAlternativeEndpoint()">Test Alternative Endpoint</button>
            <button onclick="checkAPIStatus()">Check API Status</button>
        </div>
        
        <!-- Chat Panel -->
        <div class="panel">
            <h2>💬 Chat Test</h2>
            <div class="chat-area" id="chatArea">
                <div class="message ai">👋 DeepSeek Debug Mode - Ready to test</div>
            </div>
            <textarea id="messageInput" rows="3" style="width: 100%;" placeholder="Type your message..."></textarea>
            <button onclick="sendChat()" style="width: 100%; margin-top: 10px;">Send Message</button>
        </div>
        
        <!-- Log Panel -->
        <div class="panel">
            <h2>📋 Debug Log</h2>
            <div class="log" id="logArea">
                <div class="log-entry info">✅ Debug tool initialized</div>
                <div class="log-entry info">📝 Open Console (F12) for more details</div>
            </div>
        </div>
    </div>

    <script>
        let apiKey = localStorage.getItem('deepseek_debug_key') || '';
        let currentModel = localStorage.getItem('deepseek_debug_model') || 'deepseek-chat';
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('apiKey').value = apiKey;
            document.getElementById('model').value = currentModel;
            addLog('info', 'Debug tool ready. Enter your API Key and click Test Connection');
        });
        
        function saveConfig() {
            apiKey = document.getElementById('apiKey').value.trim();
            currentModel = document.getElementById('model').value;
            localStorage.setItem('deepseek_debug_key', apiKey);
            localStorage.setItem('deepseek_debug_model', currentModel);
            addLog('success', `✅ Configuration saved - Model: ${currentModel}`);
        }
        
        async function testConnection() {
            if (!apiKey) {
                addLog('error', '❌ Please enter API Key first');
                return;
            }
            
            addLog('info', `🔄 Testing connection with model: ${currentModel}...`);
            
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [{ role: 'user', content: 'Hello' }],
                        max_tokens: 5
                    })
                });
                
                addLog('info', `📡 Response status: ${response.status} ${response.statusText}`);
                
                const data = await response.json();
                addLog('info', `📦 Response data: ${JSON.stringify(data, null, 2)}`);
                
                if (response.ok) {
                    addLog('success', '✅ API Connection successful!');
                    addMessage('ai', '✅ Connection successful! API is working correctly.');
                } else {
                    addLog('error', `❌ API Error: ${data.error?.message || 'Unknown error'}`);
                    addMessage('ai', `❌ Error: ${data.error?.message || 'Connection failed'}\n\nPlease check:\n1. API Key is correct\n2. Account has credits\n3. Check console for details`);
                    
                    // Suggest solutions
                    if (data.error?.message?.includes('authentication')) {
                        addLog('error', '💡 Tip: API Key seems invalid. Get a valid key from https://platform.deepseek.com/api_keys');
                    }
                    if (data.error?.message?.includes('insufficient')) {
                        addLog('error', '💡 Tip: Insufficient balance. Need to add credits at https://platform.deepseek.com');
                    }
                }
            } catch (error) {
                addLog('error', `❌ Network Error: ${error.message}`);
                addLog('error', '💡 Possible issues:\n- CORS blocking (try using a CORS proxy)\n- Network connection problem\n- API endpoint down');
                addMessage('ai', `❌ Network Error: ${error.message}\n\nTry using a CORS proxy or check your internet connection.`);
            }
        }
        
        async function testSimpleRequest() {
            if (!apiKey) {
                addLog('error', '❌ Please enter API Key first');
                return;
            }
            
            addLog('info', '🚀 Sending simple test request...');
            
            const requestBody = {
                model: currentModel,
                messages: [
                    { role: 'system', content: 'You are a helpful assistant.' },
                    { role: 'user', content: 'Say "OK" if you can hear me' }
                ],
                max_tokens: 50,
                temperature: 0.7
            };
            
            addLog('info', `📤 Request: ${JSON.stringify(requestBody, null, 2)}`);
            
            try {
                const startTime = Date.now();
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(requestBody)
                });
                
                const endTime = Date.now();
                addLog('info', `⏱️ Response time: ${endTime - startTime}ms`);
                
                const data = await response.json();
                
                if (response.ok && data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    addLog('success', `✅ Response received: ${reply}`);
                    addMessage('ai', reply);
                } else {
                    addLog('error', `❌ Error: ${JSON.stringify(data)}`);
                    addMessage('ai', `❌ Error: ${data.error?.message || 'Unknown error'}`);
                }
            } catch (error) {
                addLog('error', `❌ Request failed: ${error.message}`);
            }
        }
        
        async function testWithProxy() {
            addLog('info', '🔄 Testing with CORS proxy (corsproxy.io)...');
            
            const proxyUrl = 'https://corsproxy.io/?';
            const targetUrl = 'https://api.deepseek.com/v1/chat/completions';
            
            try {
                const response = await fetch(proxyUrl + encodeURIComponent(targetUrl), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [{ role: 'user', content: 'Test' }],
                        max_tokens: 5
                    })
                });
                
                addLog('info', `Proxy response status: ${response.status}`);
                const data = await response.json();
                addLog('info', `Proxy response: ${JSON.stringify(data)}`);
                
                if (response.ok) {
                    addLog('success', '✅ Proxy connection successful!');
                } else {
                    addLog('error', '❌ Proxy connection failed');
                }
            } catch (error) {
                addLog('error', `Proxy error: ${error.message}`);
            }
        }
        
        async function testAlternativeEndpoint() {
            addLog('info', 'Testing alternative endpoints...');
            
            const endpoints = [
                'https://api.deepseek.com/v1/chat/completions',
                'https://api.deepseek.com/v1/models',
                'https://api.deepseek.com/health'
            ];
            
            for (const endpoint of endpoints) {
                try {
                    addLog('info', `Testing: ${endpoint}`);
                    const response = await fetch(endpoint, {
                        headers: {
                            'Authorization': `Bearer ${apiKey}`
                        }
                    });
                    addLog('info', `${endpoint} - Status: ${response.status}`);
                } catch (error) {
                    addLog('error', `${endpoint} - Error: ${error.message}`);
                }
            }
        }
        
        async function checkAPIStatus() {
            addLog('info', '🔍 Checking API availability...');
            
            // Check if DeepSeek API is reachable
            try {
                const response = await fetch('https://api.deepseek.com/v1/models', {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });
                
                addLog('info', `API Status: ${response.status}`);
                
                if (response.status === 401) {
                    addLog('error', '❌ Authentication failed - Invalid API Key');
                } else if (response.status === 200) {
                    addLog('success', '✅ API is accessible and key is valid');
                    const data = await response.json();
                    addLog('info', `Available models: ${JSON.stringify(data.data?.map(m => m.id) || [])}`);
                } else {
                    addLog('error', `⚠️ API returned status ${response.status}`);
                }
            } catch (error) {
                addLog('error', `❌ Cannot reach API: ${error.message}`);
                addLog('info', '💡 Try:\n1. Check internet connection\n2. Disable VPN/Proxy\n3. Try again later');
            }
        }
        
        async function sendChat() {
            if (!apiKey) {
                addLog('error', '❌ Please configure API Key first');
                addMessage('ai', '❌ Please enter your API Key in the configuration panel first.');
                return;
            }
            
            const message = document.getElementById('messageInput').value.trim();
            if (!message) return;
            
            addMessage('user', message);
            document.getElementById('messageInput').value = '';
            
            addLog('info', `💬 Sending: ${message.substring(0, 100)}...`);
            
            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: [
                            { role: 'system', content: 'You are a helpful AI assistant.' },
                            { role: 'user', content: message }
                        ],
                        temperature: 0.7,
                        max_tokens: 1000
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.choices && data.choices[0]) {
                    const reply = data.choices[0].message.content;
                    addLog('success', `✅ Response received (${reply.length} chars)`);
                    addMessage('ai', reply);
                } else {
                    addLog('error', `❌ API Error: ${data.error?.message || 'Unknown'}`);
                    addMessage('ai', `❌ Error: ${data.error?.message || 'Failed to get response'}`);
                }
            } catch (error) {
                addLog('error', `❌ Network Error: ${error.message}`);
                addMessage('ai', `❌ Network Error: ${error.message}\n\nCheck your internet connection and try again.`);
            }
        }
        
        function addMessage(role, content) {
            const chatArea = document.getElementById('chatArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            messageDiv.innerHTML = `<strong>${role === 'user' ? '👤 You' : '🤖 AI'}:</strong><br>${content.replace(/\n/g, '<br>')}`;
            chatArea.appendChild(messageDiv);
            messageDiv.scrollIntoView({ behavior: 'smooth' });
        }
        
        function addLog(type, message) {
            const logArea = document.getElementById('logArea');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            logEntry.innerHTML = `[${timestamp}] ${message}`;
            logArea.appendChild(logEntry);
            logEntry.scrollIntoView({ behavior: 'smooth' });
            
            // Also log to console
            if (type === 'error') console.error(message);
            else if (type === 'success') console.log('✅', message);
            else console.log(message);
        }
        
        function clearLogs() {
            document.getElementById('logArea').innerHTML = '<div class="log-entry info">🗑️ Logs cleared</div>';
        }
    </script>
</body>
</html>
